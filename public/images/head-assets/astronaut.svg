<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Helmet outer -->
  <ellipse cx="256" cy="240" rx="200" ry="210" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="3"/>
  <!-- Helmet inner ring -->
  <ellipse cx="256" cy="240" rx="185" ry="195" fill="#d0d0d0"/>
  <!-- Visor frame -->
  <path d="M120 200 C120 120 180 60 256 60 C332 60 392 120 392 200 C392 300 340 360 256 360 C172 360 120 300 120 200Z" fill="#1a237e" fill-opacity="0.85" stroke="#283593" stroke-width="3"/>
  <!-- Visor reflection 1 -->
  <path d="M160 140 C180 100 240 80 300 100 C280 120 220 130 160 140Z" fill="white" opacity="0.2"/>
  <!-- Visor reflection 2 -->
  <path d="M340 180 C350 200 350 230 340 260" stroke="white" stroke-width="4" fill="none" opacity="0.15" stroke-linecap="round"/>
  <!-- Stars in visor -->
  <circle cx="200" cy="200" r="2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="170" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="250" cy="250" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="330" cy="230" r="2" fill="white" opacity="0.5"/>
  <circle cx="180" cy="280" r="1.5" fill="white" opacity="0.3"/>
  <!-- Neck ring -->
  <rect x="150" y="410" width="212" height="40" rx="20" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="2"/>
  <!-- Helmet side panels -->
  <rect x="60" y="200" width="40" height="60" rx="10" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="412" y="200" width="40" height="60" rx="10" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="2"/>
  <!-- Flag patch -->
  <rect x="70" y="210" width="20" height="14" rx="2" fill="#fe5102" opacity="0.8"/>
</svg>
