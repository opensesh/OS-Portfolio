<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Bag body -->
  <path d="M120 80 L110 420 C110 435 130 450 256 450 C382 450 402 435 402 420 L392 80 Z" fill="#c9a96e" stroke="#a0835a" stroke-width="3"/>
  <!-- Bag fold top -->
  <path d="M120 80 C120 60 180 45 256 45 C332 45 392 60 392 80 C392 100 332 110 256 110 C180 110 120 100 120 80Z" fill="#d4b87c" stroke="#a0835a" stroke-width="2"/>
  <!-- Paper texture lines -->
  <line x1="160" y1="120" x2="155" y2="430" stroke="#b89860" stroke-width="0.8" opacity="0.4"/>
  <line x1="220" y1="110" x2="218" y2="440" stroke="#b89860" stroke-width="0.8" opacity="0.3"/>
  <line x1="290" y1="110" x2="292" y2="440" stroke="#b89860" stroke-width="0.8" opacity="0.3"/>
  <line x1="350" y1="120" x2="355" y2="430" stroke="#b89860" stroke-width="0.8" opacity="0.4"/>
  <!-- Crease lines -->
  <path d="M170 150 Q200 155 230 148" stroke="#b89860" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M280 200 Q320 195 360 202" stroke="#b89860" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Left eye hole -->
  <ellipse cx="195" cy="240" rx="35" ry="30" fill="#1a1a1a"/>
  <!-- Right eye hole -->
  <ellipse cx="317" cy="240" rx="35" ry="30" fill="#1a1a1a"/>
  <!-- Eyebrows (drawn on) -->
  <path d="M160 200 Q195 185 230 200" stroke="#5d4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M282 200 Q317 185 352 200" stroke="#5d4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Mouth (drawn on, wobbly smile) -->
  <path d="M190 340 Q220 370 256 375 Q292 370 322 340" stroke="#5d4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Nose (drawn triangle) -->
  <path d="M245 280 L256 310 L267 280" stroke="#5d4037" stroke-width="3" fill="none" stroke-linejoin="round"/>
</svg>
