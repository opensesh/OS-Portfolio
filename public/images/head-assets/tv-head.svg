<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- TV body -->
  <rect x="96" y="80" width="320" height="280" rx="16" fill="#2a2a2a" stroke="#444" stroke-width="4"/>
  <!-- Screen bezel -->
  <rect x="120" y="104" width="272" height="216" rx="8" fill="#1a1a1a"/>
  <!-- Screen -->
  <rect x="132" y="116" width="248" height="192" rx="4" fill="#0a3a2a"/>
  <!-- Scanlines (subtle) -->
  <line x1="132" y1="140" x2="380" y2="140" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <line x1="132" y1="164" x2="380" y2="164" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <line x1="132" y1="188" x2="380" y2="188" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <line x1="132" y1="212" x2="380" y2="212" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <line x1="132" y1="236" x2="380" y2="236" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <line x1="132" y1="260" x2="380" y2="260" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <line x1="132" y1="284" x2="380" y2="284" stroke="#0f5f3f" stroke-width="0.5" opacity="0.3"/>
  <!-- Static noise text on screen -->
  <text x="256" y="220" text-anchor="middle" font-family="monospace" font-size="28" fill="#33ff88" opacity="0.8">NO SIGNAL</text>
  <!-- Knobs -->
  <circle cx="420" cy="300" r="12" fill="#333" stroke="#555" stroke-width="2"/>
  <circle cx="420" cy="340" r="12" fill="#333" stroke="#555" stroke-width="2"/>
  <!-- Antenna left -->
  <line x1="200" y1="80" x2="160" y2="20" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <!-- Antenna right -->
  <line x1="312" y1="80" x2="352" y2="20" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="160" cy="20" r="6" fill="#fe5102"/>
  <circle cx="352" cy="20" r="6" fill="#fe5102"/>
  <!-- Legs -->
  <rect x="160" y="360" width="16" height="40" rx="4" fill="#333"/>
  <rect x="336" y="360" width="16" height="40" rx="4" fill="#333"/>
  <!-- Feet -->
  <rect x="148" y="392" width="40" height="8" rx="4" fill="#444"/>
  <rect x="324" y="392" width="40" height="8" rx="4" fill="#444"/>
  <!-- Power LED -->
  <circle cx="420" cy="260" r="4" fill="#fe5102" opacity="0.9"/>
</svg>
